<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Price Tag Generator</title>
  <script>
    // Row number passed by Apps Script doGet: ?page=generator&row=132
    // This makes the generator auto-load the selected request when opened from the sidebar.
    var PRELOAD_ROW = 0;
    (function () {
      try {
        // Apps Script template value. Keep this file as generator.html and open with createTemplateFromFile().
        var templateValue = '<?= typeof preloadRow !== "undefined" ? preloadRow : "" ?>';
        var templateRow = parseInt(templateValue, 10);
        if (!isNaN(templateRow) && templateRow > 0) PRELOAD_ROW = templateRow;
      } catch (e) {
        console.warn('[INIT] Template row not available:', e);
      }

      try {
        // Fallback if the row is visible in the URL.
        var params = new URLSearchParams(window.location.search);
        var urlRow = parseInt(params.get('row') || '0', 10);
        if (!isNaN(urlRow) && urlRow > 0) PRELOAD_ROW = urlRow;
      } catch (e) {
        console.warn('[INIT] URL row not available:', e);
      }

      console.log('[INIT] Final PRELOAD_ROW:', PRELOAD_ROW);
    })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Nunito+Sans:wght@400;600;700;800;900&family=Noto+Sans+Arabic:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f1117;
      --surface: #181c27;
      --card:    #1e2333;
      --border:  #2a3045;
      --accent:  #e8b84b;
      --text:    #e8e6e0;
      --muted:   #7a7f94;
      --red:     #c0392b;
      --radius:  10px;
      --tag-width: 8cm;
      --tag-height: 6cm;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Topbar ── */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .topbar-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }

    .topbar-logo span { color: var(--accent); }
    .topbar-sub { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 310px 1fr;
      flex: 1;
      height: calc(100vh - 56px);
      overflow: hidden;
    }

    /* ── Left panel ── */
    .left-panel {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-head {
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .panel-head h2 {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .search-wrap { position: relative; }
    .search-wrap svg {
      position: absolute; left: 10px; top: 50%;
      transform: translateY(-50%); color: var(--muted); pointer-events: none;
    }

    .search-input {
      width: 100%;
      padding: 8px 12px 8px 32px;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input::placeholder { color: var(--muted); }
    .search-input:focus { border-color: var(--accent); }

    /* ── Filters ── */
    .filters {
      padding: 10px 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .filter-btn {
      padding: 4px 12px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #0f1117; font-weight: 600; }

    /* ── Product list ── */
    .product-list {
      overflow-y: auto;
      flex: 1;
      padding: 8px;
    }

    .product-list::-webkit-scrollbar { width: 3px; }
    .product-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .product-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 11px 13px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.12s;
    }

    .product-card:hover { border-color: var(--accent); transform: translateX(2px); }

    .pc-name { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 1px; }
    .pc-arabic { font-size: 11px; color: var(--muted); text-align: right; direction: rtl; margin-bottom: 4px; }
    .pc-desc { font-size: 10px; color: var(--muted); line-height: 1.35; margin-bottom: 6px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    .pc-footer { display: flex; align-items: center; justify-content: space-between; }
    .pc-price { font-size: 12px; font-weight: 600; color: var(--accent); }
    .pc-cat { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted);
      background: var(--bg); padding: 2px 7px; border-radius: 4px; }

    .add-btn {
      width: 100%; margin-top: 8px;
      padding: 6px;
      background: transparent;
      border: 1.5px solid var(--accent);
      border-radius: 6px;
      color: var(--accent);
      font-family: 'Outfit', sans-serif;
      font-size: 11px; font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .add-btn:hover { background: var(--accent); color: #0f1117; }
    .add-btn:disabled { opacity: 0.35; cursor: default; }

    /* ── Right panel ── */
    .right-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    .right-inner {
      flex: 1;
      overflow-y: auto;
      padding: 22px 26px;
    }

    .right-inner::-webkit-scrollbar { width: 3px; }
    .right-inner::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Section header ── */
    .sec-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .sec-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 19px;
      font-weight: 600;
      color: var(--text);
    }

    .sec-count {
      font-size: 11px; color: var(--muted);
      background: var(--surface); border: 1px solid var(--border);
      padding: 2px 10px; border-radius: 12px;
    }

    /* ── Table ── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 14px;
    }

    table { width: 100%; border-collapse: collapse; font-size: 12px; }

    thead th {
      background: var(--card);
      padding: 10px 12px;
      text-align: left;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }

    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.12s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.02); }
    tbody td { padding: 10px 12px; vertical-align: middle; }

    .td-name { font-weight: 500; color: var(--text); font-size: 12px; }
    .td-arabic { font-size: 11px; color: var(--muted); direction: rtl; }
    .td-desc { color: var(--muted); font-size: 11px; max-width: 180px; }
    .td-price { color: var(--accent); font-weight: 600; white-space: nowrap; }
    .td-weight { color: var(--muted); font-size: 11px; }

    /* ── Qty control ── */
    .qty-control { display: flex; align-items: center; border: 1.5px solid var(--border); border-radius: 6px; overflow: hidden; width: fit-content; }
    .qty-btn { width: 26px; height: 26px; background: var(--card); border: none; color: var(--text); font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.12s; }
    .qty-btn:hover { background: var(--border); }
    .qty-val { width: 32px; height: 26px; background: var(--surface); border: none; border-left: 1px solid var(--border); border-right: 1px solid var(--border); color: var(--text); font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 500; text-align: center; outline: none; }

    .remove-btn { padding: 4px 10px; background: transparent; border: 1.5px solid var(--red); border-radius: 5px; color: var(--red); font-family: 'Outfit', sans-serif; font-size: 10px; font-weight: 500; cursor: pointer; transition: background 0.12s, color 0.12s; }
    .remove-btn:hover { background: var(--red); color: #fff; }

    /* ── Empty cart ── */
    .cart-empty { padding: 40px; text-align: center; color: var(--muted); font-size: 13px; }
    .cart-empty-icon { font-size: 32px; margin-bottom: 8px; }

    /* ── Action bar ── */
    .action-bar { display: flex; gap: 8px; margin-bottom: 24px; justify-content: flex-end; }

    .btn { padding: 9px 20px; border-radius: 7px; font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; letter-spacing: 0.5px; }
    .btn-ghost { background: transparent; border: 1.5px solid var(--border); color: var(--muted); }
    .btn-ghost:hover { border-color: var(--text); color: var(--text); }
    .btn-primary { background: var(--accent); color: #0f1117; font-weight: 600; }
    .btn-primary:hover { background: #f0c85c; box-shadow: 0 4px 18px rgba(232,184,75,0.28); }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Preview grid ── */
    .preview-grid {
      display: grid;
      grid-template-columns: repeat(2, var(--tag-width));
      gap: 0.25cm;
      justify-content: start;
      align-items: start;
    }

    /* ═══════════════════════════════════════════════════════════════
       PRICE TAG TEMPLATE — USER EXACT 8cm × 6cm TEMPLATE
       Coordinates, colors, and sizing follow the supplied master.
       ═══════════════════════════════════════════════════════════════ */
    .price-tag {
      position: relative;
      width: 8cm;
      height: 6cm;
      background: #e9dab8;
      overflow: hidden;
      page-break-after: always;
      box-sizing: border-box;
      box-shadow: 0 2px 14px rgba(0,0,0,0.28);
      font-family: Arial, Helvetica, sans-serif;
      animation: fadeIn 0.25s ease both;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .border-box {
      position: absolute;
      top: 0.40cm;
      left: 0.36cm;
      right: 0.24cm;
      bottom: 0.42cm;
      border: 1px solid #776145;
      z-index: 1;
      pointer-events: none;
    }

    /* Move the item name fully inside the border line.
       English item name stays 0.5cm and Arabic name stays below it. */

    /* Title block: fully inside the border, no top cut, English fixed at 0.5cm */
    .name-stack {
      position: absolute;
      top: 0.44cm;
      left: 0.42cm;
      right: 0.42cm;
      height: 1.72cm;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      text-align: center;
      z-index: 3;
      overflow: hidden;
    }

    .title {
      position: relative;
      width: 100%;
      min-height: 0.55cm;
      max-height: 1.32cm;
      display: block;
      padding: 0.04cm 0.10cm 0 0.10cm;
      text-align: center;
      font-family: 'Anton', 'Arial Black', Arial, Helvetica, sans-serif;
      font-size: 0.5cm;
      font-weight: 900;
      letter-spacing: 0.04cm;
      line-height: 0.70cm;
      color: #874812;
      text-transform: uppercase;
      overflow: hidden;
      word-break: normal;
      overflow-wrap: normal;
    }

    .arabic-title {
      position: relative;
      width: 100%;
      margin-top: 0.02cm;
      min-height: 0.36cm;
      max-height: 0.40cm;
      padding: 0 0.10cm;
      text-align: center;
      color: #874812;
      direction: rtl;
      font-size: 0.40cm;
      font-weight: 500;
      line-height: 0.38cm;
      font-family: Arial, Tahoma, 'Noto Sans Arabic', sans-serif;
      overflow: hidden;
    }

    .desc-en {
      position: absolute;
      top: 2.12cm;
      left: 0.56cm;
      width: 3.34cm;
      height: 1.02cm;
      max-height: 1.02cm;
      font-size: 0.25cm;
      line-height: 0.27cm;
      letter-spacing: 0;
      word-spacing: 0;
      text-align: left;
      color: #874812;
      overflow: hidden;
    }

    .center-line {
      position: absolute;
      top: 2.16cm;
      left: 4cm;
      height: 0.92cm;
      border-left: 1px solid #874812;
    }

    .desc-ar {
      position: absolute;
      top: 2.12cm;
      right: 0.56cm;
      width: 3.34cm;
      height: 1.02cm;
      max-height: 1.02cm;
      font-size: 0.25cm;
      line-height: 0.27cm;
      letter-spacing: 0;
      word-spacing: 0;
      text-align: right;
      direction: rtl;
      color: #874812;
      font-family: Arial, Tahoma, 'Noto Sans Arabic', sans-serif;
      overflow: hidden;
    }

    .allergens {
      position: absolute;
      top: 3.50cm;
      left: 0.45cm;
      right: 0.45cm;
      height: 0.30cm;
      max-height: 0.30cm;
      text-align: center;
      font-size: 0.13cm;
      font-weight: 800;
      line-height: 0.14cm;
      color: #874812;
      overflow: hidden;
    }

    .allergens-ar {
      display: block;
      direction: rtl;
      font-size: 0.14cm;
      font-family: Arial, Tahoma, 'Noto Sans Arabic', sans-serif;
      font-weight: 600;
      line-height: 0.15cm;
      margin-top: 0.02cm;
    }

    .bottom-bar {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 2.15cm;
      background: #874812;
      color: #f5e8c9;
    }

    .net-wt {
      position: absolute;
      left: 0.65cm;
      bottom: 0.92cm;
      font-size: 0.4cm;
      line-height: 0.4cm;
      letter-spacing: 0.03cm;
      white-space: nowrap;
      color: #f5e8c9;
    }

    .portions {
      position: absolute;
      left: 0.65cm;
      bottom: 0.58cm;
      font-size: 0.3cm;
      line-height: 0.3cm;
      font-weight: 700;
      letter-spacing: 0.01cm;
      white-space: nowrap;
      color: #f5e8c9;
    }

    .portions .portion-separator {
      display: inline-block;
      margin: 0 0.18cm;
      font-weight: 700;
    }

    .price {
      position: absolute;
      right: 1.15cm;
      bottom: 0.48cm;
      font-size: 1.25cm;
      font-weight: 900;
      line-height: 1.25cm;
      letter-spacing: 0.02cm;
      white-space: nowrap;
      color: #f5e8c9;
    }

    .aed {
      position: absolute;
      right: 0.42cm;
      bottom: 1.20cm;
      font-size: 0.40cm;
      line-height: 0.40cm;
      font-weight: 900;
      color: #f5e8c9;
    }

    /* ── Loading ── */
    .loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; color: var(--muted); }
    .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    /* ── PRINT STYLES: A4 with 8 pcs per page ── */
    @media print {
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        color-adjust: exact !important;
      }

      @page {
        size: A4 portrait;
        margin: 0.5cm;
      }

      html,
      body {
        width: auto !important;
        min-width: 0 !important;
        height: auto !important;
        margin: 0 !important;
        padding: 0 !important;
        background: #fff !important;
      }

      .topbar, .left-panel, .action-bar, #autoLoadBanner,
      .sec-header, .table-wrap, #loadingOverlay { display: none !important; }

      /* Print header: show branch name only */
      .request-banner {
        display: block !important;
        width: 16.25cm !important;
        height: 0.65cm !important;
        margin: 0 auto 0.25cm auto !important;
        padding: 0.13cm 0.25cm !important;
        background: #182233 !important;
        border: 0 !important;
        color: #e8e6e0 !important;
        font-size: 10px !important;
        line-height: 1 !important;
        box-sizing: border-box !important;
        overflow: hidden !important;
      }

      .request-banner > div:first-child {
        display: block !important;
        width: 100% !important;
        margin: 0 !important;
        padding: 0 !important;
      }

      .request-banner strong {
        display: block !important;
        color: #f4c542 !important;
        font-size: 11px !important;
        font-weight: 800 !important;
        letter-spacing: 0.3px !important;
        line-height: 1.1 !important;
        text-align: left !important;
        white-space: nowrap !important;
        overflow: hidden !important;
        text-overflow: ellipsis !important;
      }

      #rbDate,
      #rbItems {
        display: none !important;
      }

      .layout,
      .right-panel,
      .right-inner,
      .preview-section {
        display: block !important;
        width: auto !important;
        height: auto !important;
        margin: 0 !important;
        padding: 0 !important;
        overflow: visible !important;
        background: #fff !important;
      }

      .preview-grid {
        display: grid !important;
        grid-template-columns: repeat(2, 8cm) !important;
        grid-auto-rows: 6cm !important;
        gap: 0.25cm !important;
        justify-content: center !important;
        align-items: start !important;
        width: 100% !important;
        margin: 0 !important;
        padding: 0 !important;
        background: #fff !important;
      }

      .price-tag {
        width: 8cm !important;
        height: 6cm !important;
        margin: 0 !important;
        padding: 0 !important;
        box-shadow: none !important;
        background: #e9dab8 !important;
        page-break-inside: avoid !important;
        break-inside: avoid !important;
        page-break-after: auto !important;
        break-after: auto !important;
      }

      .price-tag:nth-child(8n) {
        page-break-after: always !important;
        break-after: page !important;
      }

      .border-box { border-color: #776145 !important; }
      .name-stack { z-index: 3 !important; }
      .title, .arabic-title, .desc-en, .desc-ar, .allergens { color: #874812 !important; }
      .center-line { border-left-color: #874812 !important; }
      .bottom-bar { background: #874812 !important; color: #f5e8c9 !important; }
      .net-wt, .portions, .price, .aed { color: #f5e8c9 !important; }
    }

    /* Loading overlay */
    #loadingOverlay {
      display: none !important;
    }
    
    #loadingOverlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top-color: #c9a876;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Auto-load banner */
    #autoLoadBanner {
      background: #fff3cd;
      border-bottom: 2px solid #f0d080;
      padding: 12px 24px;
      font-size: 13px;
      transition: all 0.3s;
    }


    .topbar-actions { display: none !important; }

    .request-banner {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: #182233;
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      font-size: 12px;
      color: var(--text);
    }

    .request-banner.visible { display: flex !important; }
    .request-banner strong { color: var(--accent); font-size: 13px; }
    .request-banner span { color: var(--muted); margin-left: 10px; }
    .request-banner .requested-items {
      max-width: 55%;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: right;
    }
  </style>
</head>
<body>
  <div id="loadingOverlay">
    <div class="spinner"></div>
  </div>
  


  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-logo" id="generatorTitle">Price<span>Tag</span> Generator</div>
    <div class="topbar-actions">
      <button class="reset-bg-btn" id="resetBgBtn" onclick="resetBackground()" style="display:none;">Reset Template</button>
      <label for="bgUploadInput" class="upload-bg-btn">📤 Upload Template</label>
      <input type="file" id="bgUploadInput" accept="image/*" onchange="handleBackgroundUpload(event)">
    </div>
    <div class="topbar-sub">Admin · Print Tool</div>
  </div>
  
  <!-- Auto-load banner -->
  <div id="autoLoadBanner" style="display:none;"></div>

  <!-- Request details banner shown when opened from the Google Sheets sidebar -->
  <div id="requestBanner" class="request-banner">
    <div>
      <strong id="rbBranch">—</strong>
      <span id="rbDate"></span>
    </div>
    <div id="rbItems" class="requested-items"></div>
  </div>

  <div class="layout">

    <!-- LEFT: Product Database -->
    <div class="left-panel">
      <div class="panel-head">
        <h2>Items Database</h2>
        <div class="search-wrap">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input class="search-input" id="searchInput" type="text" placeholder="Search items…">
        </div>
      </div>

      <div class="filters" id="filterBar">
        <button class="filter-btn active" data-cat="ALL">ALL</button>
        <button class="filter-btn" data-cat="CAKES">CAKES</button>
        <button class="filter-btn" data-cat="BAKERY">BAKERY</button>
        <button class="filter-btn" data-cat="PASTRIES">PASTRIES</button>
        <button class="filter-btn" data-cat="SSMM">SSMM</button>
      </div>

      <div class="product-list" id="productList">
        <div class="loading-screen">
          <div class="spinner"></div>
          <span>Loading products…</span>
        </div>
      </div>
    </div>

    <!-- RIGHT: Cart + Preview -->
    <div class="right-panel">
      <div class="right-inner">

        <!-- Cart -->
        <div class="sec-header">
          <div class="sec-title">Selected Items for Print</div>
          <div class="sec-count" id="selCount">0 items</div>
        </div>

        <div class="table-wrap">
          <div class="cart-empty" id="cartEmpty">
            <div class="cart-empty-icon">🏷️</div>
            <p>No items selected. Add products from the left.</p>
          </div>
          <table id="selTable" style="display:none;">
            <thead>
              <tr>
                <th>Item Name</th>
                <th>Description</th>
                <th>Price</th>
                <th>Net Weight</th>
                <th>Qty</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="selBody"></tbody>
          </table>
        </div>

        <div class="action-bar">
          <button class="btn btn-ghost" onclick="clearAll()">Clear All</button>
          <button class="btn btn-primary" id="pdfBtn" onclick="window.print()" disabled>
            🖨 Generate PDF
          </button>
        </div>

        <!-- Preview -->
        <div class="preview-section">
          <div class="sec-header">
            <div class="sec-title">Preview</div>
          </div>
          <div class="preview-grid" id="previewGrid"></div>
        </div>

      </div>
    </div>
  </div>

  <script>
    let allProducts  = [];
    let cart         = [];
    let activeFilter = 'ALL';

    // ── Helpers ───────────────────────────────────────────
    function hideLoadingOverlay() {
      const overlay = document.getElementById('loadingOverlay');
      if (overlay) {
        overlay.classList.add('hidden');
        setTimeout(() => overlay.style.display = 'none', 350);
      }
    }

    function showAutoLoadBanner(message, type = 'info') {
      const banner = document.getElementById('autoLoadBanner');
      if (!banner) return;

      const styles = {
        info:    ['#fff3cd', '#f0d080', '#856404'],
        success: ['#d4edda', '#c3e6cb', '#155724'],
        error:   ['#f8d7da', '#f5c6cb', '#721c24'],
        warn:    ['#fff3cd', '#f0d080', '#856404']
      }[type] || ['#fff3cd', '#f0d080', '#856404'];

      banner.style.display = 'block';
      banner.style.background = styles[0];
      banner.style.borderBottom = '2px solid ' + styles[1];
      banner.innerHTML = '<div style="color:' + styles[2] + ';font-size:13px;font-weight:600;">' + message + '</div>';
    }

    function normalizeProduct(p) {
      p = p || {};
      return {
        name:          (p.name || '').toString().trim(),
        arabicName:    (p.arabicName || '').toString().trim(),
        description:   (p.description || p.descriptionEN || '').toString().trim(),
        descriptionEN: (p.descriptionEN || p.description || '').toString().trim(),
        descriptionAR: (p.descriptionAR || '').toString().trim(),
        price:         (p.price || '').toString().trim(),
        symbol:        (p.symbol || 'AED').toString().trim(),
        netWeight:     (p.netWeight || p.netWeightEN || '').toString().trim(),
        netWeightEN:   (p.netWeightEN || p.netWeight || '').toString().trim(),
        netWeightAR:   (p.netWeightAR || '').toString().trim(),
        portions:      (p.portions || p.portion || p.servings || p.serving || '').toString().trim(),
        portionsEN:    (p.portionsEN || p.portionEN || p.servingsEN || p.servingEN || p.portions || p.portion || '').toString().trim(),
        portionsAR:    (p.portionsAR || p.portionAR || p.servingsAR || p.servingAR || '').toString().trim(),
        allergensEN:   (p.allergensEN || '').toString().trim(),
        allergensAR:   (p.allergensAR || '').toString().trim(),
        category:      (p.category || '').toString().trim().toUpperCase()
      };
    }

    function cleanName(value) {
      return (value || '')
        .toString()
        .toLowerCase()
        .replace(/&/g, ' and ')
        .replace(/\([^)]*\)/g, ' ')
        .replace(/[^a-z0-9]+/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function parseRequestedItems(priceTagList) {
      return (priceTagList || '')
        .split(/\r?\n/)
        .map(line => {
          let text = line.replace(/^\s*\d+\s*[.)-]?\s*/, '').trim();
          text = text.replace(/\s*[—-]\s*AED\s*[\d.]+\s*$/i, '').trim();

          let qty = 1;
          const qtyMatch = text.match(/\((\d+)\s*(?:pcs?|pc|pieces?|tags?)\)\s*$/i) ||
                           text.match(/\b(?:x|qty\s*)\s*(\d+)\s*$/i);
          if (qtyMatch) {
            qty = Math.max(1, parseInt(qtyMatch[1], 10) || 1);
            text = text.replace(qtyMatch[0], '').trim();
          }

          return { raw: line, name: text, clean: cleanName(text), qty };
        })
        .filter(item => item.name && item.clean);
    }

    function findBestProductMatch(requestItem) {
      let best = null;
      let bestScore = 0;
      const requestWords = requestItem.clean.split(' ').filter(w => w.length > 1);

      allProducts.forEach(product => {
        const productClean = cleanName(product.name);
        if (!productClean) return;

        let score = 0;
        if (productClean === requestItem.clean) score = 100;
        else if (productClean.includes(requestItem.clean)) score = 90;
        else if (requestItem.clean.includes(productClean)) score = 85;
        else {
          const productWords = productClean.split(' ').filter(w => w.length > 1);
          const matchedWords = requestWords.filter(rw => productWords.some(pw => pw === rw || pw.includes(rw) || rw.includes(pw)));
          score = Math.round((matchedWords.length / Math.max(requestWords.length, 1)) * 80);
        }

        if (score > bestScore) {
          bestScore = score;
          best = product;
        }
      });

      return bestScore >= 55 ? best : null;
    }


    window.addEventListener('beforeprint', () => {
      const banner = document.getElementById('autoLoadBanner');
      if (banner) banner.style.display = 'none';
    });

    // ── Boot ─────────────────────────────────────────────
    window.addEventListener('DOMContentLoaded', () => {
      document.getElementById('filterBar').addEventListener('click', e => {
        const btn = e.target.closest('.filter-btn');
        if (!btn) return;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.cat;
        renderProductList();
      });

      document.getElementById('searchInput').addEventListener('input', renderProductList);

      google.script.run
        .withSuccessHandler(data => {
          allProducts = (data || []).map(normalizeProduct).filter(p => p.name);
          renderProductList();
          hideLoadingOverlay();
          console.log('[BOOT] Products loaded:', allProducts.length, 'products');
          console.log('[BOOT] PRELOAD_ROW:', PRELOAD_ROW);

          if (PRELOAD_ROW && PRELOAD_ROW > 1) {
            google.script.run
              .withSuccessHandler(req => {
                preloadRequest(req);
                hideLoadingOverlay();
              })
              .withFailureHandler(err => {
                console.error('[ERROR] Failed to load request:', err);
                showAutoLoadBanner('✗ Failed to load request row ' + PRELOAD_ROW + ': ' + (err.message || err), 'error');
                hideLoadingOverlay();
              })
              .getRequestData(PRELOAD_ROW);
          } else {
            hideLoadingOverlay();
          }
        })
        .withFailureHandler(err => {
          document.getElementById('productList').innerHTML =
            `<div style="text-align:center;padding:32px;color:var(--muted);font-size:12px;">⚠ Failed to load: ${err.message}</div>`;
          showAutoLoadBanner('✗ Failed to load product database: ' + (err.message || err), 'error');
          hideLoadingOverlay();
        })
        .getProducts();
    });

    // ── Pre-load items from a request row ─────────────────
    function preloadRequest(req) {
      console.log('[PRELOAD] preloadRequest called with:', req);

      if (!req || !req.priceTagList) {
        console.error('[PRELOAD] Request data is empty:', req);
        showAutoLoadBanner('✗ Request row ' + PRELOAD_ROW + ' has no price tag list.', 'error');
        return;
      }

      const reqBanner = document.getElementById('requestBanner');
      if (reqBanner) reqBanner.classList.add('visible');

      const rbBranch = document.getElementById('rbBranch');
      const rbDate = document.getElementById('rbDate');
      const itemsEl = document.getElementById('rbItems');

      if (rbBranch) rbBranch.textContent = req.branch || '—';
      if (rbDate) rbDate.textContent = req.dateRequested ? 'Requested: ' + req.dateRequested : '';
      if (itemsEl) {
        itemsEl.textContent = req.priceTagList || '';
        itemsEl.title = req.priceTagList || '';
      }

      // Use the requesting branch as the page/print title.
      if (req.branch) {
        document.title = req.branch;
        const generatorTitle = document.getElementById('generatorTitle');
        if (generatorTitle) generatorTitle.textContent = req.branch;
      }

      const requestedItems = parseRequestedItems(req.priceTagList);
      console.log('[PRELOAD] Requested items:', requestedItems);

      cart = [];
      const missing = [];
      let addedCount = 0;
      let totalTags = 0;

      requestedItems.forEach(item => {
        const match = findBestProductMatch(item);
        if (match) {
          const existing = cart.find(c => c.product.name === match.name);
          if (existing) existing.qty += item.qty;
          else cart.push({ product: match, qty: item.qty });

          addedCount++;
          totalTags += item.qty;
          console.log('[PRELOAD] Auto-added:', match.name, 'qty:', item.qty, 'from:', item.name);
        } else {
          missing.push(item.name);
          console.warn('[PRELOAD] Could not match:', item.name);
        }
      });

      renderAll();

      if (addedCount > 0) {
        // Do not show the auto-loaded message on the site or print preview.
        const banner = document.getElementById('autoLoadBanner');
        if (banner) {
          banner.style.display = 'none';
          banner.innerHTML = '';
        }

        const rightPanel = document.querySelector('.right-inner');
        if (rightPanel) rightPanel.scrollTo({ top: 0, behavior: 'smooth' });

        if (missing.length) {
          console.warn('[PRELOAD] Missing requested items:', missing);
        }
      } else {
        showAutoLoadBanner('✗ Could not auto-load. No requested item names matched the Products sheet.', 'error');
      }
    }

    // ── Product list ──────────────────────────────────────
    function renderProductList() {
      const q = document.getElementById('searchInput').value.trim().toLowerCase();
      const list = document.getElementById('productList');

      const filtered = allProducts.filter(p => {
        const matchCat = activeFilter === 'ALL' || p.category === activeFilter;
        const matchQ   = !q || p.name.toLowerCase().includes(q) ||
                         p.arabicName.toLowerCase().includes(q) ||
                         (p.description || '').toLowerCase().includes(q) ||
                         (p.descriptionEN || '').toLowerCase().includes(q);
        return matchCat && matchQ;
      });

      if (!filtered.length) {
        list.innerHTML = '<div style="text-align:center;padding:32px;color:var(--muted);font-size:12px;">No products found.</div>';
        return;
      }

      list.innerHTML = filtered.map((p, i) => {
        const inCart = cart.some(c => c.product.name === p.name);
        const idx    = allProducts.indexOf(p);
        return `
          <div class="product-card" style="animation:fadeIn 0.2s ease ${i*0.025}s both">
            <div class="pc-name">${p.name}</div>
            ${p.arabicName ? `<div class="pc-arabic">${p.arabicName}</div>` : ''}
            <div class="pc-desc">${p.description || '—'}</div>
            <div class="pc-footer">
              <span class="pc-price">AED ${p.price}</span>
              <span class="pc-cat">${p.category}</span>
            </div>
            <button class="add-btn" onclick="addToCart(${idx})" ${inCart ? 'disabled' : ''}>
              ${inCart ? '✓ Added' : '+ Add to Print'}
            </button>
          </div>`;
      }).join('');
    }

    // ── Cart ──────────────────────────────────────────────
    function addToCart(idx) {
      const p = allProducts[idx];
      if (cart.some(c => c.product.name === p.name)) return;
      cart.push({ product: p, qty: 1 });
      renderAll();
    }

    function removeFromCart(name) {
      cart = cart.filter(c => c.product.name !== name);
      renderAll();
    }

    function changeQty(name, delta) {
      const item = cart.find(c => c.product.name === name);
      if (item) item.qty = Math.max(1, item.qty + delta);
      renderAll();
    }

    function setQty(name, val) {
      const item = cart.find(c => c.product.name === name);
      if (item) item.qty = Math.max(1, parseInt(val) || 1);
      renderPreview(); updateCount();
    }

    function clearAll() { cart = []; renderAll(); }

    function renderAll() {
      renderProductList();
      renderTable();
      renderPreview();
      updateCount();
    }

    function updateCount() {
      const tags = cart.reduce((s, c) => s + c.qty, 0);
      document.getElementById('selCount').textContent =
        `${cart.length} item${cart.length !== 1 ? 's' : ''} · ${tags} tag${tags !== 1 ? 's' : ''}`;
      document.getElementById('pdfBtn').disabled = cart.length === 0;
    }

    // ── Table ─────────────────────────────────────────────
    function renderTable() {
      const empty = document.getElementById('cartEmpty');
      const table = document.getElementById('selTable');
      const body  = document.getElementById('selBody');

      if (!cart.length) {
        empty.style.display = 'block'; table.style.display = 'none'; return;
      }
      empty.style.display = 'none'; table.style.display = 'table';

      body.innerHTML = cart.map(({ product: p, qty }) => `
        <tr>
          <td>
            <div class="td-name">${p.name}</div>
            ${p.arabicName ? `<div class="td-arabic">${p.arabicName}</div>` : ''}
          </td>
          <td class="td-desc">${p.description || '—'}</td>
          <td class="td-price">AED ${p.price}</td>
          <td class="td-weight">${p.netWeight || '—'}</td>
          <td>
            <div class="qty-control">
              <button class="qty-btn" onclick="changeQty('${esc(p.name)}', -1)">−</button>
              <input class="qty-val" type="number" min="1" value="${qty}"
                onchange="setQty('${esc(p.name)}', this.value)">
              <button class="qty-btn" onclick="changeQty('${esc(p.name)}', 1)">+</button>
            </div>
          </td>
          <td>
            <button class="remove-btn" onclick="removeFromCart('${esc(p.name)}')">Remove</button>
          </td>
        </tr>`).join('');
    }

    // ── Preview ───────────────────────────────────────────
    function renderPreview() {
      const grid = document.getElementById('previewGrid');
      if (!cart.length) { grid.innerHTML = ''; return; }

      const tags = [];
      cart.forEach(({ product, qty }) => {
        for (let i = 0; i < qty; i++) tags.push(product);
      });

      grid.innerHTML = tags.map((p, i) => buildTagHTML(p, i)).join('');
      requestAnimationFrame(fitAllPriceTags);
    }

    function html(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function normalizePrice(value) {
      const raw = String(value || '').trim();
      const numeric = parseFloat(raw.replace(/[^0-9.]/g, ''));
      if (isNaN(numeric)) return raw || '0';
      return String(numeric).replace(/\.0$/, '');
    }

    function normalizeNetWeight(value) {
      return String(value || '')
        .replace(/net\s*w(?:ei)?ght\.?\s*/i, '')
        .trim();
    }

    function normalizeAllergensEN(value) {
      return String(value || '')
        .replace(/^\s*allergens\s*:\s*/i, '')
        .trim();
    }

    function normalizeAllergensAR(value) {
      return String(value || '')
        .replace(/^\s*(?:مسببات|مسبب)\s+الحساسية\s*[:：]?\s*/i, '')
        .trim();
    }

    function autoAllergensAR(value) {
      const raw = String(value || '').toLowerCase();
      if (!raw) return '';

      const map = [
        ['gluten', 'جلوتين'],
        ['wheat', 'قمح'],
        ['milk', 'حليب'],
        ['egg', 'بيض'],
        ['eggs', 'بيض'],
        ['soya', 'صويا'],
        ['soy', 'صويا'],
        ['nuts', 'مكسرات'],
        ['nut', 'مكسرات'],
        ['almond', 'لوز'],
        ['hazelnut', 'بندق'],
        ['pistachio', 'فستق'],
        ['peanut', 'فول سوداني'],
        ['fish', 'سمك'],
        ['gelatin', 'جيلاتين'],
        ['sesame', 'سمسم'],
        ['mustard', 'خردل'],
        ['may contain traces of', 'قد يحتوي على آثار من']
      ];

      const found = [];
      map.forEach(([en, ar]) => {
        if (raw.includes(en) && !found.includes(ar)) found.push(ar);
      });

      return found.join('، ');
    }

    function normalizePortionText(value) {
      return String(value || '')
        .replace(/^\s*(?:portions?|servings?)\s*[:：]?\s*/i, '')
        .trim();
    }

    function formatPortions(p) {
      const en = normalizePortionText(p.portionsEN || p.portions || '');
      const ar = normalizePortionText(p.portionsAR || p.netWeightAR || '');
      if (en && ar) return `${html(en)}<span class="portion-separator">|</span><span dir="rtl">${html(ar)}</span>`;
      if (en) return html(en);
      if (ar) return `<span dir="rtl">${html(ar)}</span>`;
      return '';
    }

    function titleSize(text) {
      return '0.5cm';
    }

    function arabicTitleSize(text) {
      return '0.42cm';
    }

    function descSize(text) {
      return '0.25cm';
    }

    function descArSize(text) {
      return '0.25cm';
    }

    function priceSize(price) {
      return '1.25cm';
    }

    // Build individual price tag HTML using the exact 8cm × 6cm template supplied by the user.
    function buildTagHTML(p, idx) {
      const nameEn = p.name || '';
      const nameAr = p.arabicName || '';
      const descEn = p.descriptionEN || p.description || '';
      const descAr = p.descriptionAR || '';
      const allergensEn = normalizeAllergensEN(p.allergensEN || '');
      const allergensAr = normalizeAllergensAR(p.allergensAR || '') || autoAllergensAR(allergensEn);
      const netWt = normalizeNetWeight(p.netWeightEN || p.netWeight || '');
      const price = normalizePrice(p.price);
      const portions = formatPortions(p);

      return `
        <div class="price-tag" style="animation-delay:${idx*0.04}s">
          <div class="border-box"></div>

          <div class="name-stack">
            <div class="title" style="font-size:${titleSize(nameEn)};">
              ${html(nameEn)}
            </div>

            ${nameAr ? `
              <div class="arabic-title" style="font-size:${arabicTitleSize(nameAr)};">
                ${html(nameAr)}
              </div>
            ` : ``}
          </div>

          <div class="desc-en" style="font-size:${descSize(descEn)};">
            ${html(descEn)}
          </div>

          <div class="center-line"></div>

          <div class="desc-ar" style="font-size:${descArSize(descAr)};">
            ${html(descAr)}
          </div>

          <div class="allergens">
            ${allergensEn ? `ALLERGENS: ${html(allergensEn)}` : ''}
            ${allergensAr ? `<br><span class="allergens-ar">${html(allergensAr)}</span>` : ''}
          </div>

          <div class="bottom-bar">
            <div class="net-wt">Net WT. ${html(netWt)}</div>
            ${portions ? `<div class="portions">${portions}</div>` : ``}
            <div class="price" style="font-size:${priceSize(price)};">${html(price)}</div>
            <div class="aed">${html(p.symbol || 'AED')}</div>
          </div>
        </div>`;
    }

    function fitTextToBox(el, minPx) {
      if (!el) return;
      const computed = window.getComputedStyle(el);
      let size = parseFloat(computed.fontSize);
      if (!size || isNaN(size)) return;

      let guard = 0;
      while ((el.scrollHeight > el.clientHeight + 1 || el.scrollWidth > el.clientWidth + 1) && size > minPx && guard < 50) {
        size -= 0.5;
        el.style.fontSize = size + 'px';
        guard++;
      }
    }

    function fitAllPriceTags() {
      document.querySelectorAll('.price-tag').forEach(tag => {
        /* Fixed sizes requested:
           item name = 0.5cm, description = 0.3cm, price = 1cm */
        fitTextToBox(tag.querySelector('.arabic-title'), 12);
        fitTextToBox(tag.querySelector('.allergens'), 4.5);
        fitTextToBox(tag.querySelector('.net-wt'), 8);
        fitTextToBox(tag.querySelector('.portions'), 6.5);
      });

      // Exact-template mode: CSS positions and size functions control the layout.
      if (typeof applyCustomBackground === 'function') applyCustomBackground();
    }

        function esc(s) { return (s || '').replace(/'/g, "\\'"); }

    // ── Background Template Upload (Google Drive) ──────────
    let customBackground = null;

    function handleBackgroundUpload(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        customBackground = e.target.result;
        
        // Show uploading indicator
        const btn = document.querySelector('.upload-bg-btn');
        const originalText = btn.textContent;
        btn.textContent = '⏳ Saving...';
        btn.disabled = true;
        
        // Save to Google Drive
        google.script.run
          .withSuccessHandler(function(result) {
            if (result.success) {
              console.log('✓ Template saved to Google Drive:', result.fileId);
              btn.textContent = '✓ Saved!';
              setTimeout(() => { btn.textContent = originalText; btn.disabled = false; }, 2000);
              applyCustomBackground();
              document.getElementById('resetBgBtn').style.display = 'block';
            } else {
              console.error('Failed to save template:', result.error);
              btn.textContent = '⚠ Failed';
              setTimeout(() => { btn.textContent = originalText; btn.disabled = false; }, 2000);
            }
          })
          .withFailureHandler(function(err) {
            console.error('Error saving template:', err);
            btn.textContent = '⚠ Error';
            setTimeout(() => { btn.textContent = originalText; btn.disabled = false; }, 2000);
          })
          .saveBackgroundTemplate(customBackground);
      };
      reader.readAsDataURL(file);
    }

    function applyCustomBackground() {
      // Exact-template mode: do not paint uploaded images over the generated price tag.
      return;
    }

    function resetBackground() {
      const btn = document.getElementById('resetBgBtn');
      btn.textContent = 'Deleting...';
      btn.disabled = true;
      
      // Delete from Google Drive
      google.script.run
        .withSuccessHandler(function(result) {
          if (result.success) {
            console.log('✓ Template deleted from Google Drive');
            customBackground = null;
            
            // Remove background from all tags
            document.querySelectorAll('.price-tag').forEach(tag => {
              tag.style.backgroundImage = 'none';
            });
            
            document.documentElement.style.removeProperty('--custom-bg-image');
            btn.style.display = 'none';
            btn.disabled = false;
            btn.textContent = 'Reset Template';
            
            // Re-render to apply default colors
            renderPreview();
          }
        })
        .withFailureHandler(function(err) {
          console.error('Error deleting template:', err);
          btn.disabled = false;
          btn.textContent = 'Reset Template';
        })
        .deleteBackgroundTemplate();
    }

    // Load saved background on page load
    function loadSavedBackground() {
      // Exact-template mode: keep the generated CSS template as the master background.
      return;
    }

    // Call load function when page is ready
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => loadSavedBackground(), 500);
    });

  </script>
</body>
</html>
